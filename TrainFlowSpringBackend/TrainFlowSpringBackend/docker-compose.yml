services:
  mysql:
    image: mysql:8.0
    container_name: trainflowspringbackend-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: trainflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  trainflowspringbackend:
    build: .
    container_name: trainflow-backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_BASE64_SECRET: ${JWT_BASE64_SECRET}

volumes:
  mysql_data: